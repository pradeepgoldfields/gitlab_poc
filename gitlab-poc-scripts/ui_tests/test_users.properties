# Test-user credentials for the UI evidence run.
#
# Format: one `username=password` per line. Comments start with `#`.
# Usernames must match config.TEST_USERS (after POC_PREFIX, if set).
#
# The defaults below match config.TEST_USER_DEFAULT_PASSWORD ("PocTestP@ssw0rd!2026")
# and the canonical usernames (no prefix). If you ran the PoC with --prefix, the
# usernames are suffixed — e.g. with --prefix mr1 the first line becomes
#   poc-alice-mr1=PocTestP@ssw0rd!2026
#
# `root` is the fall-back admin login used when a scenario doesn't pin a persona
# (settings pages, custom-role definitions, audit views). Replace the placeholder
# with your actual root password (printed by `docker exec gitlab-ce cat
# /etc/gitlab/initial_root_password` for fresh local Docker installs).

root=PUT-ROOT-PASSWORD-HERE

poc-alice=PocTestP@ssw0rd!2026
poc-bob=PocTestP@ssw0rd!2026
poc-carol=PocTestP@ssw0rd!2026
poc-paul=PocTestP@ssw0rd!2026
poc-sam=PocTestP@ssw0rd!2026
poc-rita=PocTestP@ssw0rd!2026
poc-dan=PocTestP@ssw0rd!2026
