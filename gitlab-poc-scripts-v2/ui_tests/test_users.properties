# v2 test-user credentials for the UI evidence run.
#
# Format: one `username=password` per line. Comments start with `#`.
# Usernames must match config.TEST_USERS (after POC_PREFIX, if set).
#
# The defaults below match config.TEST_USER_DEFAULT_PASSWORD ("PocTestP@ssw0rd!2026")
# and the canonical v2 usernames (no prefix). If you ran with --prefix, append.
#
# `root` is the admin used for all root-only screenshots.
# Replace PUT-ROOT-PASSWORD-HERE with your actual root password (printed by
# `MSYS_NO_PATHCONV=1 docker exec gitlab cat /etc/gitlab/initial_root_password`
# for fresh local Docker installs).

